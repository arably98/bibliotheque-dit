services:
  db:
    image: postgres:16-alpine
    container_name: bibliotheque-db
    environment:
      POSTGRES_USER: dit
      POSTGRES_PASSWORD: dit_password
      POSTGRES_DB: bibliotheque
    ports:
      - "5432:5432"
    volumes:
      - bibliotheque_data:/var/lib/postgresql/data

  livres:
    build: ./services/livres
    container_name: service-livres
    environment:
      DATABASE_URL: postgresql://dit:dit_password@db:5432/bibliotheque
    ports:
      - "8001:8001"
    depends_on:
      - db

  utilisateurs:
    build: ./services/utilisateurs
    container_name: service-utilisateurs
    environment:
      DATABASE_URL: postgresql://dit:dit_password@db:5432/bibliotheque
    ports:
      - "8002:8002"
    depends_on:
      - db

volumes:
  bibliotheque_data:
